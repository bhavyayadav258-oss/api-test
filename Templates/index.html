<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f7fa;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:30px;
        }

        .container{
            width:100%;
            max-width:900px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        h1{
            margin-bottom:30px;
            color:#1e293b;
            text-align:center;
        }

        .row{
            display:flex;
            gap:20px;
            margin-bottom:20px;
        }

        .input-group{
            flex:1;
            display:flex;
            flex-direction:column;
        }

        label{
            margin-bottom:8px;
            font-weight:600;
            color:#334155;
        }

        input,
        select,
        textarea{
            padding:14px;
            border:1px solid #cbd5e1;
            border-radius:8px;
            font-size:16px;
        }

        textarea{
            resize:none;
            height:150px;
        }

        .full-width{
            margin-bottom:20px;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:15px 25px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            transition:0.3s;
        }
        
        button:hover{
            background:#1d4ed8;
        }

        @media(max-width:768px){
            .row{
                flex-direction:column;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Contact Us</h1>

        <form action="/submit" method="POST">

            <div class="row">

                <div class="input-group">
                    <label>Full Name</label>
                    <input
                        type="text"
                        name="name"
                        placeholder="Enter your name"
                        required>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input
                        type="email"
                        name="email"
                        placeholder="Enter your email"
                        required>
                </div>

            </div>

            <div class="full-width input-group">
                <label>Organization</label>
                <input
                    type="text"
                    name="organization"
                    placeholder="Company / Institution">
            </div>

            <div class="full-width input-group">
                <label>Subject</label>

                <select name="subject" required>
                    <option value="">Select a Topic</option>
                    <option>Internship Inquiry</option>
                    <option>Project Collaboration</option>
                    <option>Training Program</option>
                    <option>General Query</option>
                </select>

            </div>

            <div class="full-width input-group">
                <label>Message</label>

                <textarea
                    name="message"
                    placeholder="Tell us about your inquiry..."
                    required></textarea>
            </div>

            <button type="submit">
                Send Message
            </button>

        </form>

    </div>

</body>
</html>
